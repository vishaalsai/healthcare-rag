name: Healthcare RAG CI/CD

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs when a new commit arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 on src/
        run: |
          flake8 src/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503 \
            --exclude=src/__pycache__,src/*/__pycache__

  # ── Job 2: Unit Tests ───────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          ANTHROPIC_API_KEY: "test-key-ci"
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=term-missing \
            -x

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.sha }}
          path: .coverage

  # ── Job 3: Evaluate ─────────────────────────────────────────────────────────
  # Requires ANTHROPIC_API_KEY secret to be set in repo/environment secrets.
  # Downloads the 3 clinical PDFs, ingests into ChromaDB, starts the FastAPI
  # server, then runs the golden-dataset evaluation.
  # Fails the build if mean faithfulness < 0.70.
  # Runs on master pushes only (not PRs) to avoid burning API quota.
  evaluate:
    name: Evaluate (golden dataset)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── Cache pip packages ────────────────────────────────────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # ── Cache HuggingFace sentence-transformers models ────────────────
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-mpnet-crossencoder-v1
          restore-keys: hf-models-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── Download the 3 clinical PDFs ──────────────────────────────────
      - name: Download clinical guidelines
        run: |
          mkdir -p data/raw
          curl -L --retry 3 --max-time 120 \
            -o data/raw/who_hypertension.pdf \
            "https://applications.emro.who.int/dsaf/dsa664.pdf"
          curl -L --retry 3 --max-time 120 \
            -o data/raw/who_diabetes.pdf \
            "https://applications.emro.who.int/dsaf/dsa509.pdf"
          curl -L --retry 3 --max-time 120 \
            -o data/raw/ada_standards_diabetes.pdf \
            "https://diabetes.org/sites/default/files/2023-09/dc22s007.pdf"
          find data/raw -name "*.pdf" -empty -delete
          echo "PDFs in data/raw/:"
          ls -lh data/raw/

      # ── Ingest PDFs into ChromaDB ─────────────────────────────────────
      - name: Ingest documents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/ingest_docs.py --reset

      # ── Start FastAPI in background ───────────────────────────────────
      - name: Start FastAPI server
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uvicorn src.api:app --host 0.0.0.0 --port 8000 &
          echo "API_PID=$!" >> $GITHUB_ENV

      # ── Wait for API to be ready ──────────────────────────────────────
      - name: Wait for API health check
        run: |
          echo "Waiting for FastAPI to become ready..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API is ready (attempt ${i})"
              curl -s http://localhost:8000/health | python3 -m json.tool
              exit 0
            fi
            echo "Attempt ${i}/40 — waiting 5s..."
            sleep 5
          done
          echo "ERROR: API did not become ready after 200s"
          exit 1

      # ── Run evaluation ────────────────────────────────────────────────
      - name: Run golden-dataset evaluation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/run_evaluation.py \
            --dataset data/eval/golden_dataset.json \
            --api-url http://localhost:8000

      # ── Upload results as artifact ────────────────────────────────────
      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.sha }}
          path: data/eval/results/results.json

  # ── Job 4: Observability Gate ────────────────────────────────────────────
  # Reads live metrics from Langfuse and checks them against the thresholds
  # defined in config/observability_thresholds.yaml.
  # Fails the build if any hard threshold (citation coverage, failure rate,
  # P95 latency) is breached.  Prints a warning for soft thresholds (cost).
  # Skips gracefully when Langfuse is not configured or data is insufficient.
  # Runs on master pushes only — same condition as the evaluate job.
  observability-gate:
    name: Observability Regression Gate
    runs-on: ubuntu-latest
    needs: evaluate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run observability regression check
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
        run: python scripts/check_observability.py
