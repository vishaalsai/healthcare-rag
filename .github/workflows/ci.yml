name: Healthcare RAG CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Fail fast: cancel in-progress runs when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ── Job 1: Lint & Type Check ──────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}

      - name: Install lint tools
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/ scripts/ main.py

  # ── Job 2: Unit Tests ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # Tests run without ANTHROPIC_API_KEY — LLM calls are fully mocked
      - name: Run unit tests
        env:
          ANTHROPIC_API_KEY: "test-key-ci"
          APP_ENV: "testing"
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -x

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 3: Quality Regression Gate ───────────────────────────────
  # Only runs on pushes to main or PRs targeting main.
  # Requires a real ANTHROPIC_API_KEY secret and pre-ingested data.
  # Fails the build if RAGAS metrics drop below thresholds.
  quality-gate:
    name: Quality Regression Gate
    runs-on: ubuntu-latest
    needs: unit-tests
    # Only run on main branch pushes (not on every PR)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download ChromaDB artifact
        # In a real pipeline, restore the pre-built vector store from
        # an artifact or a cloud bucket (e.g., S3, GCS).
        # The example below restores from a GitHub Actions cache.
        uses: actions/cache@v4
        with:
          path: data/chroma_db
          key: chroma-db-${{ github.ref_name }}
          restore-keys: |
            chroma-db-main

      - name: Run RAGAS evaluation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APP_ENV: "ci"
        run: |
          python scripts/run_evaluation.py \
            --dataset data/eval/golden_dataset.json \
            --max-samples 50

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.sha }}
          path: data/eval/results/

  # ── Job 4: Build Summary ──────────────────────────────────────────
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: always()
    steps:
      - name: Summarise build status
        run: |
          echo "## Build Status" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
